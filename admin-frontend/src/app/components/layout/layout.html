<div class="flex h-screen bg-bakery-cream/30 overflow-hidden font-sans">
  
  <div *ngIf="isSidebarOpen" 
       class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300"
       (click)="closeSidebar()"></div>

  <aside class="fixed inset-y-0 left-0 z-50 w-72 bg-bakery-brown text-white flex flex-col transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 shadow-2xl md:shadow-none border-r border-white/5"
         [ngClass]="isSidebarOpen ? 'translate-x-0' : '-translate-x-full'">
    
    <div class="flex items-center justify-between p-8 border-b border-white/10">
      <div class="flex flex-col">
        <span class="text-3xl font-bold tracking-wider font-serif text-white">Altísimo<span class="text-bakery-gold">.</span></span>
        <span class="text-[9px] uppercase tracking-[0.4em] text-bakery-gold font-bold mt-1">Panel Gerencial</span>
      </div>
      <button (click)="closeSidebar()" class="md:hidden text-white/50 hover:text-white hover:bg-white/10 transition-colors p-2 rounded-full">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    
    <nav class="flex-1 p-5 space-y-3 overflow-y-auto">
      
      <a routerLink="/dashboard" routerLinkActive="bg-bakery-gold text-bakery-brown font-bold shadow-lg shadow-bakery-gold/20" 
         [routerLinkActiveOptions]="{exact: true}"
         class="group flex items-center gap-4 py-3.5 px-5 rounded-2xl text-white/70 hover:bg-white/5 hover:text-white transition-all duration-300" 
         (click)="closeSidebar()">
        <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        <span class="font-medium tracking-wide">Dashboard</span>
      </a>

      <a routerLink="/employees" routerLinkActive="bg-bakery-gold text-bakery-brown font-bold shadow-lg shadow-bakery-gold/20" 
         class="group flex items-center gap-4 py-3.5 px-5 rounded-2xl text-white/70 hover:bg-white/5 hover:text-white transition-all duration-300" 
         (click)="closeSidebar()">
        <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span class="font-medium tracking-wide">Equipo</span>
      </a>

      <a routerLink="/orders" routerLinkActive="bg-bakery-gold text-bakery-brown font-bold shadow-lg shadow-bakery-gold/20" 
         class="group flex items-center gap-4 py-3.5 px-5 rounded-2xl text-white/70 hover:bg-white/5 hover:text-white transition-all duration-300"
         (click)="closeSidebar()">
        <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
        <span class="font-medium tracking-wide">Pedidos</span>
      </a>

      <a routerLink="/products" routerLinkActive="bg-bakery-gold text-bakery-brown font-bold shadow-lg shadow-bakery-gold/20" 
         class="group flex items-center gap-4 py-3.5 px-5 rounded-2xl text-white/70 hover:bg-white/5 hover:text-white transition-all duration-300"
         (click)="closeSidebar()">
        <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
        <span class="font-medium tracking-wide">Catálogo</span>
      </a>

    </nav>
    
    <div class="p-6 border-t border-white/10 space-y-4">
      <div class="flex items-center gap-3 px-2 mb-4">
        <div class="w-10 h-10 rounded-full bg-bakery-gold/20 border border-bakery-gold/50 flex items-center justify-center text-bakery-gold font-serif font-bold text-lg">
          A
        </div>
        <div class="overflow-hidden">
          <p class="text-sm font-bold text-white truncate">Administrador</p>
          <p class="text-[10px] text-green-400 uppercase tracking-widest truncate flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> En línea
          </p>
        </div>
      </div>

      <button (click)="logout()" class="group w-full flex justify-center items-center gap-3 bg-red-500/10 text-red-400 py-3.5 rounded-2xl hover:bg-red-500 hover:text-white transition-all duration-300 font-bold border border-red-500/20 hover:border-transparent">
        <svg class="w-5 h-5 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col w-full h-full relative overflow-hidden">
    
    <header class="md:hidden bg-white/90 backdrop-blur-xl shadow-sm border-b border-gray-100 z-30 flex items-center justify-between p-4 absolute top-0 left-0 right-0 h-[72px]">
      <button (click)="toggleSidebar()" class="text-bakery-brown hover:bg-bakery-cream transition-colors rounded-xl p-2.5 focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      <span class="text-xl font-bold text-bakery-brown tracking-tight font-serif">Altísimo<span class="text-bakery-gold">.</span></span>
      <div class="w-11"></div> 
    </header>

    <main class="flex-1 overflow-y-auto w-full pt-[88px] md:pt-8 p-4 md:p-10 scroll-smooth">
      <div class="max-w-7xl mx-auto h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

</div>
