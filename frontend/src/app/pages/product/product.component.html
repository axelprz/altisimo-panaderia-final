<div class="relative w-full h-[50vh] md:h-[65vh] flex items-center justify-center overflow-hidden">
  <div class="absolute inset-0 z-0">
    <div class="w-full h-full bg-[url('/assets/images/portadaproductos.jpg')] bg-cover bg-center md:bg-fixed transform scale-100 motion-safe:animate-[pulse_20s_infinite]"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/30 to-bakery-cream/20"></div>
  </div>

  <div class="relative z-10 text-center px-6 max-w-4xl animate-enter">
    <span class="inline-block px-4 py-1 border border-bakery-gold/40 rounded-full text-bakery-gold uppercase tracking-[0.4em] text-[10px] font-black bg-black/30 backdrop-blur-md mb-6">
      Nuestra Boutique
    </span>
    <h1 class="font-serif text-5xl md:text-7xl text-white font-bold tracking-tight drop-shadow-2xl m-0">
      Nuestros Productos
    </h1>
    <div class="h-1.5 w-24 bg-bakery-gold mx-auto mt-6 rounded-full"></div>
    <p class="font-sans text-lg md:text-2xl font-light italic text-bakery-cream mt-6 drop-shadow">
      "Calidad artesanal en cada amasado, directo a tu mesa."
    </p>
  </div>
</div>

<div *ngIf="isLoading" class="min-h-[400px] flex justify-center items-center py-20 bg-bakery-cream/30">
  <div class="flex flex-col items-center gap-6">
    <div class="relative">
      <div class="absolute inset-0 bg-bakery-gold/20 rounded-full blur-xl animate-pulse"></div>
      <svg class="animate-spin h-14 w-14 text-bakery-gold relative" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>
    <p class="font-serif text-xl text-bakery-brown italic animate-bounce">Horneando el catálogo...</p>
  </div>
</div>

<div *ngIf="!isLoading" class="bg-bakery-cream/30 py-24 px-6 sm:px-12">
  <div class="max-w-7xl mx-auto">
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12">
      
      <div *ngFor="let product of products; let i = index" 
           [routerLink]="['/producto', product.ID]" 
           class="group flex flex-col bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden transition-all duration-500 hover:shadow-2xl hover:-translate-y-3 cursor-pointer animate-enter"
           [ngClass]="{'delay-100': i % 4 === 0, 'delay-200': i % 4 === 1, 'delay-300': i % 4 === 2, 'delay-500': i % 4 === 3}">
        
        <div class="relative aspect-[4/5] overflow-hidden">
          <img [src]="formatImageUrl(product.img)" 
               [alt]="product.name" 
               class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
          
          <div class="absolute inset-0 bg-gradient-to-t from-bakery-brown/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col justify-end p-8 text-center">
            <span class="bg-bakery-gold text-bakery-brown px-6 py-3 rounded-full font-bold text-xs uppercase tracking-[0.2em] transform translate-y-8 group-hover:translate-y-0 transition-transform duration-500 shadow-xl">
              Ver Detalles
            </span>
          </div>
          
          <div class="absolute top-6 left-6">
            <span class="px-4 py-1.5 bg-white/90 backdrop-blur-sm rounded-full text-[10px] font-black text-bakery-brown uppercase tracking-widest shadow-sm">
              Artesanal
            </span>
          </div>
        </div>
        
        <div class="p-8 text-center">
          <h3 class="font-serif text-2xl text-bakery-brown font-bold leading-tight group-hover:text-bakery-gold transition-colors duration-300">
            {{ product.name }}
          </h3>
          <div class="h-0.5 w-10 bg-bakery-gold/30 mx-auto mt-4 group-hover:w-20 transition-all duration-500"></div>
          
          <p *ngIf="product.price" class="mt-4 font-sans text-gray-400 font-bold text-lg">
            ${{ product.price }}
          </p>
        </div>
      </div>

    </div>
  </div>
</div>
